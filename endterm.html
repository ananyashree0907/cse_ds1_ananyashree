<!DOCTYPE html>
<html>
<head>
    <title>Grade Calculator</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #954913;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container{
            background: rgb(73, 188, 206);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            text-align: center;
            width: 300px;
        }

        h2{
            color: #333;
        }

        button{
            background-color: #af4c51;
            color: rgb(200, 224, 103);
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover{
            background-color: #45a049;
        }

        #result{
            margin-top: 20px;
            font-size: 18px;
            color: #222;
            line-height: 1.8;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Grade Calculator</h2>

        <button onclick="calculateGrade()">
            Calculate Grade
        </button>

        <p id="result"></p>
    </div>

<script>
function calculateGrade()
{
    let n = Number(prompt("Enter number of subjects"));
    let total = 0;

    for(let i=1; i<=n; i++)
    {
        let marks = Number(prompt("Enter marks of subject " + i));
        total = total + marks;
    }

    let avg = total / n;
    let grade;

    if(avg >= 90)
        grade = "A";
    else if(avg >= 75)
        grade = "B";
    else if(avg >= 60)
        grade = "C";
    else
        grade = "Fail";

    let output = "Total = " + total +
                 "<br>Average = " + avg.toFixed(2) +
                 "<br>Grade = " + grade;

    document.getElementById("result").innerHTML = output;
}
</script>

</body>
</html>
